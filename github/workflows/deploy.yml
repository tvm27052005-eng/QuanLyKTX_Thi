name: CI-CD Deploy Backend KTX

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Lay code moi nhat tu github
        uses: actions/checkout@v3

      - name: Ket noi SSH vao may ao va ra lenh deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          port: 22
          script: |
            cd ~/quanlyktx
            
            git pull origin main
            
            docker compose down
            docker compose up -d --build